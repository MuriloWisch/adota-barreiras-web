<div class="auth-bg">
  <div class="auth-card" @fadeSlideUp>

    <div class="auth-logo">
      <div class="logo-icon-wrap">
        <mat-icon>lock_outline</mat-icon>
      </div>
      <h1>Nova senha</h1>
      <p>Defina uma nova credencial de acesso segura para a sua conta.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group full-width">
        <mat-form-field appearance="outline">
          <mat-label>Nova senha</mat-label>
          <input matInput formControlName="password" [type]="showPwd ? 'text' : 'password'" placeholder="••••••••">
          <button mat-icon-button matSuffix type="button" (click)="showPwd = !showPwd" class="btn-toggle-visibility">
            <mat-icon>{{ showPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">A nova senha é obrigatória</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">A senha deve conter no mínimo 6 caracteres</mat-error>
        </mat-form-field>
      </div>

      <div class="form-group full-width">
        <mat-form-field appearance="outline">
          <mat-label>Confirmar senha</mat-label>
          <input matInput formControlName="confirmPassword" [type]="showPwd2 ? 'text' : 'password'" placeholder="••••••••">
          <button mat-icon-button matSuffix type="button" (click)="showPwd2 = !showPwd2" class="btn-toggle-visibility">
            <mat-icon>{{ showPwd2 ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('confirmPassword')?.hasError('mismatch')">As senhas informadas não coincidem</mat-error>
        </mat-form-field>
      </div>

      <div class="error-msg" *ngIf="errorMsg">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMsg }}</span>
      </div>

      <button mat-flat-button class="btn-submit" type="submit" [disabled]="loading">
        <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
