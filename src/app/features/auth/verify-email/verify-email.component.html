<div class="auth-bg">
  <div class="auth-card" @fadeSlideUp>

    <div *ngIf="loading" class="state-box">
      <div class="spinner-container">
        <mat-spinner diameter="44"></mat-spinner>
      </div>
      <p class="loading-text">Verificando suas credenciais...</p>
    </div>

    <div *ngIf="!loading && success" class="state-box">
      <div class="icon-wrap success-icon">
        <mat-icon>check_circle_outline</mat-icon>
      </div>
      <h2>E-mail verificado!</h2>
      <p>Sua conta foi ativada com sucesso no sistema. Você já pode acessar a plataforma.</p>
      <a mat-flat-button class="btn-redirect" routerLink="/login">Ir para o login</a>
    </div>

    <div *ngIf="!loading && !success" class="state-box">
      <div class="icon-wrap error-icon">
        <mat-icon>highlight_off</mat-icon>
      </div>
      <h2>Falha na verificação</h2>
      <p>{{ errorMsg || 'O link de ativação é inválido ou já expirou.' }}</p>
      <a mat-flat-button class="btn-redirect" routerLink="/login">Voltar ao login</a>
    </div>

  </div>
</div>
