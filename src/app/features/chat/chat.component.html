<div class="chat-page">

  <div class="desktop-layout">

    <div class="left-panel">
      <app-chat-list
        [chats]="chats()"
        [selectedChatId]="selectedChat()?.id"
        [currentUserId]="me?.id"
        (onChatSelect)="selectChat($event)">
      </app-chat-list>
    </div>

    <div class="right-panel">
      <app-chat-window
        [chat]="selectedChat() ?? undefined"
        [messages]="messages()"
        [loading]="messagesLoading()"
        [loadingMore]="loadingMore()"
        [currentUserId]="me?.id"
        (onSend)="sendMessage($event)"
        (loadPrevPage)="loadPrevPage()">
      </app-chat-window>
    </div>

  </div>

  <div class="mobile-layout">

    <div class="mobile-list" *ngIf="!mobileShowWindow">
      <app-chat-list
        [chats]="chats()"
        [selectedChatId]="selectedChat()?.id"
        [currentUserId]="me?.id"
        (onChatSelect)="selectChat($event); mobileShowWindow = true">
      </app-chat-list>
    </div>

    <div class="mobile-window" *ngIf="mobileShowWindow" @slideIn>
      <div class="mobile-back-bar">
        <button mat-icon-button (click)="mobileShowWindow = false" class="btn-back">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <span>Voltar para conversas</span>
      </div>
      <app-chat-window
        [chat]="selectedChat() ?? undefined"
        [messages]="messages()"
        [loading]="messagesLoading()"
        [loadingMore]="loadingMore()"
        [currentUserId]="me?.id"
        (onSend)="sendMessage($event)"
        (loadPrevPage)="loadPrevPage()">
      </app-chat-window>
    </div>

  </div>

</div>
