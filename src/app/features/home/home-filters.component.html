<div class="filters-card">
  <form [formGroup]="form">

    <div class="filters-header">
      <div class="filters-title">
        <mat-icon class="icon-tune">tune</mat-icon>
        <span>Filtros de busca</span>
      </div>
      <button
        type="button"
        class="btn-clear"
        [class.btn-clear--visible]="hasActiveFilters"
        (click)="clear()">
        <mat-icon>close</mat-icon>
        <span>Limpar</span>
      </button>
    </div>

    <div class="filter-group">
      <span class="group-label">Espécie</span>
      <div class="chip-container">
        <button type="button" class="chip-btn" [class.active]="isActive('species', '')" (click)="setFilter('species', '')">Todos</button>
        <button type="button" class="chip-btn" [class.active]="isActive('species', 'DOG')" (click)="setFilter('species', 'DOG')">Cães</button>
        <button type="button" class="chip-btn" [class.active]="isActive('species', 'CAT')" (click)="setFilter('species', 'CAT')">Gatos</button>
        <button type="button" class="chip-btn" [class.active]="isActive('species', 'OTHER')" (click)="setFilter('species', 'OTHER')">Outros</button>
      </div>
    </div>

    <div class="filter-group">
      <span class="group-label">Porte</span>
      <div class="chip-container">
        <button type="button" class="chip-btn" [class.active]="isActive('size', '')" (click)="setFilter('size', '')">Todos</button>
        <button type="button" class="chip-btn" [class.active]="isActive('size', 'SMALL')" (click)="setFilter('size', 'SMALL')">Pequeno</button>
        <button type="button" class="chip-btn" [class.active]="isActive('size', 'MEDIUM')" (click)="setFilter('size', 'MEDIUM')">Médio</button>
        <button type="button" class="chip-btn" [class.active]="isActive('size', 'LARGE')" (click)="setFilter('size', 'LARGE')">Grande</button>
      </div>
    </div>

    <div class="filter-group">
      <span class="group-label">Sexo</span>
      <div class="chip-container">
        <button type="button" class="chip-btn" [class.active]="isActive('sex', '')" (click)="setFilter('sex', '')">Todos</button>
        <button type="button" class="chip-btn" [class.active]="isActive('sex', 'MALE')" (click)="setFilter('sex', 'MALE')">Macho</button>
        <button type="button" class="chip-btn" [class.active]="isActive('sex', 'FEMALE')" (click)="setFilter('sex', 'FEMALE')">Fêmea</button>
      </div>
    </div>

    <div class="filter-group radius-group">
      <div class="radius-header">
        <span class="group-label">Distância máxima</span>
        <span class="radius-value">{{ form.get('radius')?.value }} km</span>
      </div>
      <mat-slider min="1" max="50" step="1" class="radius-slider">
        <input matSliderThumb formControlName="radius">
      </mat-slider>
    </div>

  </form>
</div>
