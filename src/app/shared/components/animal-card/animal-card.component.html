<div class="card" (click)="onSelect.emit(animal)" [class.card--selected]="selected">

  <div class="img-wrap">
    <img
      [src]="imageUrl"
      [alt]="animal.name"
      loading="lazy"
      (error)="onImageError($event)"
    />
    <div class="img-overlay"></div>
    <span class="badge" [style.background]="status.color">{{ status.label }}</span>
    <span class="dist-chip" *ngIf="distance">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 21s-7-4.5-7-11a7 7 0 1 1 14 0c0 6.5-7 11-7 11z"/>
        <circle cx="12" cy="10" r="2.5"/>
      </svg>
      {{ distance }}
    </span>
  </div>

  <div class="body">
    <div class="body-header">
      <h3>{{ animal.name }}</h3>
      <span class="species-icon">{{ speciesIcon }}</span>
    </div>

    <div class="tags">
      <span class="tag">{{ sizeLabel }}</span>
      <span class="tag">{{ sexLabel }}</span>
      <span class="tag" *ngIf="animal.age != null">{{ ageLabel }}</span>
    </div>

    <button class="btn-detail" type="button" (click)="$event.stopPropagation(); onSelect.emit(animal)">
      Ver detalhes
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>

</div>
